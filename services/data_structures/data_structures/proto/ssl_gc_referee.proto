// Minimal wire-compatible subset of the SSL Game Controller Referee message.
// Field numbers + enum values copied from ssl-game-controller
// proto/state/ssl_gc_referee_message.proto. proto3 parses the GC's proto2 wire bytes.
syntax = "proto3";

message Referee {
  uint64 packet_timestamp = 1;

  enum Stage {
    NORMAL_FIRST_HALF_PRE = 0;
    NORMAL_FIRST_HALF = 1;
    NORMAL_HALF_TIME = 2;
    NORMAL_SECOND_HALF_PRE = 3;
    NORMAL_SECOND_HALF = 4;
    EXTRA_TIME_BREAK = 5;
    EXTRA_FIRST_HALF_PRE = 6;
    EXTRA_FIRST_HALF = 7;
    EXTRA_HALF_TIME = 8;
    EXTRA_SECOND_HALF_PRE = 9;
    EXTRA_SECOND_HALF = 10;
    PENALTY_SHOOTOUT_BREAK = 11;
    PENALTY_SHOOTOUT = 12;
    POST_GAME = 13;
  }
  Stage stage = 2;
  sint64 stage_time_left = 3;

  enum Command {
    HALT = 0;
    STOP = 1;
    NORMAL_START = 2;
    FORCE_START = 3;
    PREPARE_KICKOFF_YELLOW = 4;
    PREPARE_KICKOFF_BLUE = 5;
    PREPARE_PENALTY_YELLOW = 6;
    PREPARE_PENALTY_BLUE = 7;
    DIRECT_FREE_YELLOW = 8;
    DIRECT_FREE_BLUE = 9;
    INDIRECT_FREE_YELLOW = 10;
    INDIRECT_FREE_BLUE = 11;
    TIMEOUT_YELLOW = 12;
    TIMEOUT_BLUE = 13;
    GOAL_YELLOW = 14;
    GOAL_BLUE = 15;
    BALL_PLACEMENT_YELLOW = 16;
    BALL_PLACEMENT_BLUE = 17;
  }
  Command command = 4;
  uint32 command_counter = 5;
  uint64 command_timestamp = 6;

  message TeamInfo {
    string name = 1;
    uint32 score = 2;
    uint32 red_cards = 3;
    repeated uint32 yellow_card_times = 4;
    uint32 yellow_cards = 5;
  }
  TeamInfo yellow = 7;
  TeamInfo blue = 8;
}
